name: 1. Build

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    if: github.repository_owner == 'Informatievlaanderen'
    name: Build
    runs-on: ubuntu-latest

    services:
      sqlserver:
        image: mcr.microsoft.com/mssql/server:2019-latest
        env:
          ACCEPT_EULA: Y
          SA_PASSWORD: E@syP@ssw0rd
          MSSQL_TCP_PORT: 1433
        ports:
          - 1433:1433

    steps:
      - name: Free up disk space
        run: |
          echo "Before:"; df -h /
          sudo rm -rf /usr/local/lib/android      # Android SDK/NDK (~9-12 GB)
          sudo rm -rf /opt/ghc /usr/local/.ghcup  # Haskell toolchain (~5.5 GB)
          sudo rm -rf /opt/hostedtoolcache        # preinstalled tool cache (~8 GB)
          sudo rm -rf /usr/share/swift            # Swift (~1.5 GB)
          sudo rm -rf /usr/share/dotnet           # preinstalled .NET; setup-dotnet reinstalls the needed SDK
          docker image prune -af || true          # preinstalled docker images (~4 GB)
          echo "After:"; df -h /

      - name: Checkout Code
        uses: actions/checkout@v6

      # needed for Sonar, default is 11 and is deprecated
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: 17
          distribution: "temurin"

      - name: Parse repository name
        run: echo REPOSITORY_NAME=$(echo "$GITHUB_REPOSITORY" | awk -F / '{print $2}' | sed -e "s/:refs//") >> $GITHUB_ENV
        shell: bash

      - name: Setup .NET Core
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ vars.VBR_DOTNET_VERSION_10 }}
      - name: .NET version
        shell: bash
        run: dotnet --info

      - uses: actions/cache@v5
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj*') }}-${{ hashFiles('Directory.Packages.props') }}
          restore-keys: ${{ runner.os }}-nuget

      - name: Restore packages
        shell: bash
        run: |
          ./pre-restore.sh
          dotnet tool restore
          dotnet restore

      - name: Cache SonarCloud packages
        uses: actions/cache@v5
        with:
          path: ~/sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Cache SonarCloud scanner
        id: cache-sonar-scanner
        uses: actions/cache@v5
        with:
          path: ./.sonar/scanner
          key: ${{ runner.os }}-sonar-scanner
          restore-keys: ${{ runner.os }}-sonar-scanner

      - name: Install DotCover
        shell: bash
        run: |
          dotnet tool install --global JetBrains.dotCover.CommandLineTools --version 2026.1.0.1

      - name: Install SonarCloud scanner
        if: steps.cache-sonar-scanner.outputs.cache-hit != 'true'
        shell: bash
        run: |
          mkdir .sonar
          mkdir .sonar/scanner
          dotnet tool update dotnet-sonarscanner --tool-path ./.sonar/scanner

      - name: Sonar begin build & analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.VBR_SONAR_TOKEN }}
        shell: bash
        run: |
          ./.sonar/scanner/dotnet-sonarscanner begin /k:"Informatievlaanderen_road-registry" /o:"informatievlaanderen" /d:sonar.token="${{ secrets.VBR_SONAR_TOKEN }}" /d:sonar.host.url="https://sonarcloud.io" /d:sonar.cs.dotcover.reportsPaths=dotCover.Output.xml > /dev/null 2>&1

      - name: Build
        shell: bash
        run: |
          dotnet build --nologo --no-restore --configuration Debug RoadRegistry.sln

      - name: Test
        shell: bash
        run: dotCover cover --target-working-directory . --xml-report-output=dotCover.Output.xml -- test --nologo --no-build --filter 'FullyQualifiedName!~IntegrationTests' RoadRegistry.sln
        env:
          SA_PASSWORD: E@syP@ssw0rd

      - name: Sonar end build & analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }} # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.VBR_SONAR_TOKEN }}
        shell: bash
        run: |
          ./.sonar/scanner/dotnet-sonarscanner end /d:sonar.token="${{ secrets.VBR_SONAR_TOKEN }}" > /dev/null 2>&1
